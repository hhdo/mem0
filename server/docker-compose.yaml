name: mem0-dev

services:
  mem0:
    image: mem0-server-offline:1.0
    build:
      context: ..
      dockerfile: server/dev.Dockerfile
    working_dir: /app/server
    privileged: true
    ports:
      - "8888:8000"
    env_file:
      - .env
    networks:
      - mem0_network
    volumes:
      - ./history:/app/history
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      # Single source of truth for your browser-facing host (IP or hostname).
      # Example: PUBLIC_HOST=http://192.168.128.10
      - DASHBOARD_URL=${PUBLIC_HOST:-http://localhost}:3000
      - CORS_ALLOW_ORIGINS=${PUBLIC_HOST:-http://localhost}:3000,http://localhost:3000
      - APP_DB_NAME=mem0_app
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - MEM0_TELEMETRY=${MEM0_TELEMETRY:-true}

  postgres:
      image: ankane/pgvector:v0.5.1
      restart: on-failure
      shm_size: "128mb"
      privileged: true
      networks:
        - mem0_network
      environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
      healthcheck:
        test: ["CMD", "pg_isready", "-q", "-d", "postgres", "-U", "postgres"]
        interval: 5s
        timeout: 5s
        retries: 5
      volumes:
        - postgres_db:/var/lib/postgresql/data
        - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      ports:
        - "8432:5432"

  mem0-dashboard:
    image: mem0-dashboard-offline:1.0
    build: ./dashboard
    ports:
      - "3000:3000"
    networks:
      - mem0_network
    environment:
      # Must be reachable from the browser (so don't use container DNS like http://mem0:8000 here).
      - NEXT_PUBLIC_API_URL=${PUBLIC_HOST:-http://localhost}:8888
      - API_INTERNAL_URL=http://mem0:8000
      - NEXT_PUBLIC_INSTANCE_NAME=${NEXT_PUBLIC_INSTANCE_NAME:-Mem0}
      # Internal HTTP deployments (no TLS) must not use Secure cookies.
      - MEM0_COOKIE_SECURE=${MEM0_COOKIE_SECURE:-false}
    depends_on:
      mem0:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_db:

networks:
  mem0_network:
    driver: bridge
